# Render Blueprint — Vedam Events (Frontend + Backend)
# https://dashboard.render.com/select-repo?type=blueprint

services:
  # Express API
  - type: web
    name: vedam-events-api
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: events@vedam.org
      - key: CRON_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  # Next.js frontend
  - type: web
    name: vedam-events-web
    runtime: node
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_SITE_NAME
        value: Vedam Events
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false

  # Email reminders cron
  - type: cron
    name: vedam-events-reminders
    runtime: node
    region: singapore
    schedule: "0 * * * *"
    rootDir: backend
    buildCommand: npm install
    startCommand: node scripts/cron-reminders.mjs
    envVars:
      - key: API_URL
        fromService:
          name: vedam-events-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: CRON_SECRET
        fromService:
          name: vedam-events-api
          type: web
          envVarKey: CRON_SECRET
