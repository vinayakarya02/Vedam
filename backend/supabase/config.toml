# Vedam Events - Supabase local config
# See: https://supabase.com/docs/guides/cli/config

project_id = "vedam-events"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/admin"]

[storage]
enabled = true
file_size_limit = "4MB"
